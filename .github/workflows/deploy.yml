name: Deploy to Hosting via FTP

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Deploy Source Code
    runs-on: ubuntu-latest
    
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 📂 Sync files to Hosting
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: pro.id.vn
          username: cuocsong675a
          password: DYTrBQQmFtX4erXXc3cY
          port: 21
          server-dir: public_html/
          # Cấu hình quan trọng để sửa lỗi Timeout:
          # Thử chuyển đổi giữa các mức độ bảo mật để tránh bị Firewall chặn socket
          security: loose 
          # Tăng thời gian chờ nếu kết nối mạng từ GitHub đến Host chậm
          timeout: 60000 
          # Loại bỏ các file log trạng thái để tránh tạo thêm socket kết nối
          dangerous-clean-slate: false